<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Tail</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #222535;
  --border: #2e3248;
  --text: #e2e4f0;
  --text2: #8b90b0;
  --accent: #5b7fff;
  --accent2: #3d5af1;
  --user-bg: #1e2a4a;
  --ai-bg: #1a1d27;
  --radius: 14px;
}
[data-theme="light"] {
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --bg3: #eaecf6;
  --border: #d0d4e8;
  --text: #1a1d2e;
  --text2: #5a607a;
  --accent: #3d5af1;
  --accent2: #2845d8;
  --user-bg: #dce4ff;
  --ai-bg: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: background .2s, color .2s; }
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo svg { width: 36px; height: 36px; }
.brand { font-size: 1.15rem; font-weight: 700; letter-spacing: -.3px; }
.brand span { color: var(--accent); }
.sys-info { font-size: .75rem; color: var(--text2); margin-left: 6px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.lang-badge {
  font-size: .7rem; padding: 3px 8px;
  border-radius: 20px; border: 1px solid var(--border);
  color: var(--text2); transition: .2s;
}
.lang-badge.es { border-color: #5b7fff44; color: var(--accent); }
.lang-badge.en { border-color: #34d39944; color: #34d399; }
.lang-badge.mixed { border-color: #f472b644; color: #f472b6; }
.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text2); cursor: pointer; padding: 5px 9px; font-size: .85rem;
  transition: .15s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

.main { display: flex; flex: 1; min-height: 0; }
#chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#messages {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
}
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 10px; }
.msg.user { flex-direction: row-reverse; margin-left: auto; max-width: 80%; }
.msg.ai { margin-right: auto; max-width: 820px; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700;
}
.msg.user .avatar { background: var(--accent2); color: #fff; }
.msg.ai .avatar { background: var(--bg3); color: var(--accent); border: 1px solid var(--border); }
.bubble {
  padding: 12px 16px; border-radius: var(--radius);
  line-height: 1.65; font-size: .92rem;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
.msg.ai .bubble {
  background: var(--ai-bg); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.bubble strong { color: var(--text); font-weight: 700; }
.bubble code {
  background: var(--bg3); padding: 1px 5px; border-radius: 4px;
  font-family: 'Consolas', monospace; font-size: .85em;
}
.meta {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 6px; margin-top: 8px;
}
.badge {
  font-size: .68rem; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; letter-spacing: .3px; text-transform: uppercase;
}
.badge.alta, .badge.high { background: #16a34a22; color: #4ade80; border: 1px solid #4ade8044; }
.badge.media, .badge.medium { background: #d9770622; color: #fb923c; border: 1px solid #fb923c44; }
.badge.baja, .badge.low { background: #dc262622; color: #f87171; border: 1px solid #f8717144; }
.badge.debate { background: #3d5af122; color: #818cf8; border: 1px solid #818cf844; }
.domain-tag {
  font-size: .65rem; padding: 2px 7px; border-radius: 20px;
  border: 1px solid currentColor; opacity: .85; font-weight: 500;
}
.copy-btn {
  margin-left: auto; background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: .78rem; padding: 2px 6px; border-radius: 6px;
  transition: .15s;
}
.copy-btn:hover { color: var(--accent); background: var(--bg3); }
.sources-wrap { margin-top: 6px; }
.sources-btn {
  font-size: .72rem; color: var(--text2); background: none; border: none;
  cursor: pointer; text-decoration: underline dotted;
}
.sources-btn:hover { color: var(--text); }
.sources-list { display: none; margin-top: 4px; padding-left: 14px; font-size: .72rem; color: var(--text2); }
.sources-list.open { display: block; }

.thinking { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity: .15; } 40% { opacity: 1; } }

.input-bar {
  padding: 12px 16px; border-top: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.qbtn {
  font-size: .72rem; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); cursor: pointer; transition: .15s;
}
.qbtn:hover { border-color: var(--accent); color: var(--accent); }
.input-row { display: flex; gap: 8px; }
#msg-input {
  flex: 1; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: .92rem; outline: none; resize: none;
  max-height: 120px; transition: border-color .15s; font-family: inherit;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--text2); }
#send-btn {
  padding: 10px 18px; border-radius: 10px;
  background: var(--accent); border: none; color: #fff;
  font-size: .92rem; cursor: pointer; font-weight: 600; transition: .15s;
}
#send-btn:hover { background: var(--accent2); }
#send-btn:disabled { opacity: .5; cursor: not-allowed; }

#side-panel {
  width: 260px; border-left: 1px solid var(--border);
  background: var(--bg2); display: none; flex-direction: column;
  overflow-y: auto; flex-shrink: 0;
}
#side-panel.open { display: flex; }
.panel-header {
  padding: 14px 16px; font-size: .85rem; font-weight: 700;
  border-bottom: 1px solid var(--border); color: var(--text2);
  display: flex; justify-content: space-between; align-items: center;
}
.panel-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1rem; }
.panel-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.panel-section h4 { font-size: .73rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-row { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 4px; }
.stat-val { font-weight: 600; color: var(--accent); }
.domain-bar { margin-bottom: 6px; }
.domain-bar-label { font-size: .72rem; color: var(--text2); margin-bottom: 2px; display: flex; justify-content: space-between; }
.domain-bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.domain-bar-fill { height: 100%; border-radius: 3px; }

@media (max-width: 600px) {
  #side-panel { position: fixed; right: 0; top: 0; height: 100%; z-index: 100; width: 85vw; }
  .sys-info { display: none; }
}

/* ── Modal Overlay & Base ────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
  z-index: 200; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; width: min(480px, 95vw);
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-header h2 { font-size: .95rem; font-weight: 700; flex: 1; }
.modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── Modal Enseñar ──────────────────────────────────────────── */
#teach-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
  z-index: 200; align-items: center; justify-content: center;
}
#teach-overlay.open { display: flex; }
#teach-modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; width: min(680px, 95vw);
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.teach-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.teach-header h2 { font-size: .95rem; font-weight: 700; flex: 1; }
.teach-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; }
.teach-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

/* Tabs dentro del modal */
.teach-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.ttab {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: none; color: var(--text2); cursor: pointer; font-size: .8rem;
  transition: .15s;
}
.ttab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Campos del formulario */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: .75rem; color: var(--text2); margin-bottom: 4px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: .88rem; font-family: inherit; outline: none;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 120px; }

/* Clasificación previa */
#classify-result {
  display: none; margin: 10px 0; padding: 10px 14px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg3); font-size: .82rem; line-height: 1.6;
}
#classify-result.show { display: block; }
.clf-domain { font-weight: 700; color: var(--accent); font-size: .9rem; }
.clf-new { color: #fb923c; font-weight: 700; }
.clf-reason { color: var(--text2); margin-top: 4px; font-size: .78rem; }
.clf-alts { color: var(--text2); font-size: .75rem; }

/* Domain override chips */
.domain-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.dchip {
  padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2); cursor: pointer; font-size: .72rem;
  transition: .15s;
}
.dchip:hover, .dchip.selected { border-color: var(--accent); color: var(--accent); background: #5b7fff11; }

/* Resultado del guardado */
#save-result {
  display: none; margin-top: 10px; padding: 10px 14px;
  border-radius: 10px; font-size: .82rem;
}
#save-result.ok  { display: block; background: #16a34a22; border: 1px solid #4ade8044; color: #4ade80; }
#save-result.err { display: block; background: #dc262622; border: 1px solid #f8717144; color: #f87171; }

.teach-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* Botones comunes */
.btn-primary {
  padding: 8px 20px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: .88rem;
  font-weight: 600; cursor: pointer; transition: .15s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary {
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: .88rem; cursor: pointer; transition: .15s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ── Auth Modal Styles ────────────────────────────────────────── */
#auth-overlay { z-index: 300; }
#auth-modal { width: min(420px, 95vw); }
.auth-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center; border: none; background: none;
  color: var(--text2); cursor: pointer; font-size: .88rem; font-weight: 600;
  border-bottom: 2px solid transparent; transition: .15s;
}
.auth-tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
}
.auth-tab:hover { color: var(--text); }
.auth-form-group { margin-bottom: 14px; }
.auth-form-group label { display: block; font-size: .75rem; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
.auth-form-group input {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: .88rem; outline: none;
}
.auth-form-group input:focus { border-color: var(--accent); }
.auth-error {
  display: none; padding: 8px 12px; border-radius: 8px;
  background: #dc262622; border: 1px solid #f8717144;
  color: #f87171; font-size: .82rem; margin-bottom: 12px;
}
.auth-error.show { display: block; }

/* ── User Profile Panel ────────────────────────────────────────── */
.user-profile {
  padding: 8px; border-radius: 8px; background: var(--bg3);
  display: flex; flex-direction: column; gap: 8px; min-width: 140px;
}
.user-profile-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  font-size: .85rem; font-weight: 600; color: var(--text);
}
.user-profile-logout {
  padding: 6px 12px; border: none; border-radius: 6px;
  background: none; border: 1px solid var(--border);
  color: var(--text2); font-size: .82rem; cursor: pointer;
  transition: .15s;
}
.user-profile-logout:hover { border-color: #f87171; color: #f87171; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="17" fill="#1a1d27" stroke="#5b7fff" stroke-width="1.5"/>
      <path d="M10 22 Q14 10 18 16 Q22 22 26 10" stroke="#5b7fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="10" cy="22" r="2.5" fill="#4ade80"/>
      <circle cx="26" cy="10" r="2.5" fill="#f472b6"/>
    </svg>
  </div>
  <div>
    <div class="brand">Green <span>Tail</span></div>
    <div class="sys-info" id="sys-info">conectando...</div>
  </div>
  <div class="header-right">
    <div class="lang-badge" id="lang-badge">—</div>
    <button class="icon-btn" id="theme-btn" title="Tema">☀</button>
    <button class="icon-btn" id="teach-btn" title="Enseñar nuevo conocimiento">✎</button>
    <button class="icon-btn" id="stats-btn" title="Estadísticas">⊞</button>
    <button class="icon-btn" id="analyst-btn" title="Análisis autónomo">🔬</button>
    <button class="icon-btn" id="clear-btn" title="Limpiar">⌫</button>
    <button class="icon-btn" id="user-btn" title="Usuario" style="position:relative;">👤</button>
  </div>
</header>

<div class="main">
  <div id="chat-area">
    <div id="messages"></div>
    <div class="input-bar">
      <div class="quick-btns">
        <button class="qbtn" data-q="¿Qué es la fotosíntesis?">Fotosíntesis</button>
        <button class="qbtn" data-q="Explica la selección natural y la evolución">Evolución</button>
        <button class="qbtn" data-q="¿Cómo funciona el sistema inmune?">Inmunología</button>
        <button class="qbtn" data-q="¿Qué es la inflación y cómo afecta la economía?">Economía</button>
        <button class="qbtn" data-q="¿Qué estudia la sociología?">Sociología</button>
        <button class="qbtn" data-q="Explica la mecánica cuántica">Cuántica</button>
        <button class="qbtn" data-q="What is DNA methylation?">Methylation</button>
        <button class="qbtn" data-q="¿Qué es la epigenética?">Epigenética</button>
        <button class="qbtn" data-q="¿Cómo funcionas?" style="border-color:#5b7fff55;color:var(--accent)">¿Cómo funcionas?</button>
      </div>
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="Pregunta en español o en inglés…"></textarea>
        <button id="send-btn">Enviar</button>
      </div>
    </div>
  </div>

  <div id="side-panel">
    <div class="panel-header">
      Estadísticas <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-section">
      <h4>Conocimiento</h4>
      <div class="stat-row"><span>Pasajes</span><span class="stat-val" id="st-passages">—</span></div>
      <div class="stat-row"><span>Términos</span><span class="stat-val" id="st-terms">—</span></div>
      <div class="stat-row"><span>Materias</span><span class="stat-val" id="st-domains">—</span></div>
      <div class="stat-row"><span>Perfil</span><span class="stat-val" id="st-tier">—</span></div>
    </div>
    <div class="panel-section">
      <h4>Pasajes por materia</h4>
      <div id="domain-bars"></div>
    </div>
    <div class="panel-section">
      <h4>Sistema</h4>
      <div class="stat-row"><span>CPU cores</span><span class="stat-val" id="st-cpu">—</span></div>
      <div class="stat-row"><span>RAM total</span><span class="stat-val" id="st-ram">—</span></div>
      <div class="stat-row"><span>RAM libre</span><span class="stat-val" id="st-ramfree">—</span></div>
    </div>
  </div>
</div>

<!-- ── Modal Autenticación ────────────────────────────────────────── -->
<div id="auth-overlay" class="overlay">
  <div id="auth-modal" class="modal">
    <div class="modal-header">
      <h2>👤 Acceder a Green Tail</h2>
      <button class="modal-close" id="auth-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>

      <!-- Formulario Login -->
      <form id="login-form">
        <div class="auth-error" id="login-error"></div>
        <div class="auth-form-group">
          <label>Usuario</label>
          <input type="text" id="login-username" placeholder="Tu nombre de usuario" required>
        </div>
        <div class="auth-form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="Tu contraseña" required>
        </div>
      </form>

      <!-- Formulario Register -->
      <form id="register-form" style="display:none;">
        <div class="auth-error" id="register-error"></div>
        <div class="auth-form-group">
          <label>Usuario</label>
          <input type="text" id="register-username" placeholder="Elige un nombre de usuario" required>
        </div>
        <div class="auth-form-group">
          <label>Contraseña</label>
          <input type="password" id="register-password" placeholder="Crea una contraseña" required>
        </div>
        <div class="auth-form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="register-confirm" placeholder="Repite la contraseña" required>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" id="auth-cancel">Cancelar</button>
      <button class="btn-primary" id="auth-submit">Iniciar sesión</button>
    </div>
  </div>
</div>

<!-- ── Modal Enseñar ──────────────────────────────────────────── -->
<div id="teach-overlay">
  <div id="teach-modal">
    <div class="teach-header">
      <h2>✎ Enseñar nuevo conocimiento</h2>
      <button class="teach-close" id="teach-close">✕</button>
    </div>
    <div class="teach-body">
      <div class="teach-tabs">
        <button class="ttab active" data-tab="nuevo">Nuevo tema</button>
        <button class="ttab" data-tab="enriquecer">Enriquecer existente</button>
      </div>

      <!-- TAB: Nuevo tema -->
      <div id="tab-nuevo">
        <div class="field">
          <label>Título del tema <span style="color:var(--text2)">(opcional — se infiere del texto)</span></label>
          <input type="text" id="teach-title" placeholder="Ej: Termodinámica del agujero negro">
        </div>
        <div class="field">
          <label>Contenido <span style="color:var(--text2)">— pega texto, párrafos, artículos, apuntes…</span></label>
          <textarea id="teach-text" placeholder="Escribe o pega aquí el contenido que quieres que Green Tail aprenda. Puede ser cualquier tema: ciencia, historia, arte, tecnología, derecho… Se clasificará automáticamente."></textarea>
        </div>

        <div id="classify-result">
          <div id="clf-main"></div>
          <div class="clf-reason" id="clf-reason"></div>
          <div class="clf-alts" id="clf-alts"></div>
          <div style="margin-top:8px;font-size:.75rem;color:var(--text2);">Dominio detectado — puedes cambiarlo:</div>
          <div class="domain-chips" id="domain-chips"></div>
          <div style="margin-top:8px;" class="field">
            <label>O escribe un dominio nuevo</label>
            <input type="text" id="teach-domain-override" placeholder="Ej: astronomia, derecho, arte">
          </div>
        </div>

        <div id="save-result"></div>
      </div>

      <!-- TAB: Enriquecer -->
      <div id="tab-enriquecer" style="display:none">
        <div class="field">
          <label>Buscar archivo a enriquecer (escribe el tema)</label>
          <input type="text" id="enrich-query" placeholder="Ej: fotosíntesis, epigenética, inflación…">
        </div>
        <div id="enrich-file-result" style="font-size:.8rem;color:var(--text2);margin-bottom:8px;min-height:20px;"></div>
        <div class="field">
          <label>Título de la nueva sección <span style="color:var(--text2)">(opcional)</span></label>
          <input type="text" id="enrich-section" placeholder="Ej: Descubrimientos recientes">
        </div>
        <div class="field">
          <label>Contenido adicional</label>
          <textarea id="enrich-text" placeholder="Texto que añadirás al archivo existente…"></textarea>
        </div>
        <div id="enrich-result"></div>

    <div class="teach-footer">
      <button class="btn-secondary" id="teach-cancel">Cancelar</button>
      <button class="btn-primary" id="teach-classify-btn">Analizar dominio</button>
      <button class="btn-primary" id="teach-save-btn" style="display:none">Guardar</button>
      <button class="btn-primary" id="enrich-save-btn" style="display:none">Añadir sección</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'gt_history_v2';
const SESSION_KEY = 'gt_session_v1';
const THEME_KEY   = 'gt_theme';

let history = [];
let langCounts = {es: 0, en: 0};
let currentSession = null;

const $msgs     = document.getElementById('messages');
const $input    = document.getElementById('msg-input');
const $send     = document.getElementById('send-btn');
const $langBadge= document.getElementById('lang-badge');
const $sysInfo  = document.getElementById('sys-info');
const $themeBtn = document.getElementById('theme-btn');
const $statsBtn   = document.getElementById('stats-btn');
const $analystBtn = document.getElementById('analyst-btn');
const $clearBtn   = document.getElementById('clear-btn');
const $panel      = document.getElementById('side-panel');
const $pClose     = document.getElementById('panel-close');
const $userBtn    = document.getElementById('user-btn');

// Auth elements
const $authOverlay = document.getElementById('auth-overlay');
const $authModal = document.getElementById('auth-modal');
const $authClose = document.getElementById('auth-close');
const $authCancel = document.getElementById('auth-cancel');
const $authSubmit = document.getElementById('auth-submit');
const $loginForm = document.getElementById('login-form');
const $registerForm = document.getElementById('register-form');

let authMode = 'login';

// ── Sesión ────────────────────────────────────────────────────
function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) { currentSession = JSON.parse(raw); return currentSession; }
  } catch(_) {}
  return null;
}
function saveSession(username, token) {
  currentSession = {username, token};
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentSession));
}
function clearSession() {
  currentSession = null;
  localStorage.removeItem(SESSION_KEY);
}
function getAuthHeaders() {
  if (!currentSession?.token) return {};
  return {'Authorization': `Bearer ${currentSession.token}`};
}

// Detecta token inválido (servidor reiniciado) y muestra login
function handleUnauth() {
  clearSession();
  updateUserUI();
  showLoginModal();
}

// ── Modal de login/registro ───────────────────────────────────
function showLoginModal(mode = 'login') {
  authMode = mode;
  _refreshModal();
  $authOverlay.classList.add('open');
  setTimeout(() => document.getElementById('login-username')?.focus(), 50);
}
function hideLoginModal() {
  $authOverlay.classList.remove('open');
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('register-error').style.display = 'none';
}
function _refreshModal() {
  const isLogin = authMode === 'login';
  document.querySelectorAll('.auth-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === authMode)
  );
  $loginForm.style.display    = isLogin ? '' : 'none';
  $registerForm.style.display = isLogin ? 'none' : '';
  $authSubmit.textContent     = isLogin ? 'Entrar' : 'Crear cuenta';
}
function _showError(msg, isReg = false) {
  const el = document.getElementById(isReg ? 'register-error' : 'login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Botón de usuario ──────────────────────────────────────────
function updateUserUI() {
  if (currentSession) {
    $userBtn.title   = `👤 ${currentSession.username} — clic para cerrar sesión`;
    $userBtn.style.color   = 'var(--accent)';
    $userBtn.style.borderColor = 'var(--accent)';
  } else {
    $userBtn.title = 'Iniciar sesión';
    $userBtn.style.color = '';
    $userBtn.style.borderColor = '';
  }
}
function toggleUserMenu() {
  if (currentSession) {
    if (confirm(`¿Cerrar sesión de "${currentSession.username}"?`)) doLogout();
  } else {
    showLoginModal('login');
  }
}

// ── Login / Registro ──────────────────────────────────────────
async function doAuth(username, password, isReg = false) {
  const endpoint = isReg ? '/register' : '/login';
  try {
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();

    // El servidor siempre devuelve 200; chequeamos data.success
    if (!data.success) {
      _showError(data.message || 'Error de autenticación', isReg);
      return false;
    }

    if (isReg) {
      // Registro OK → cambia a login con mensaje de éxito
      authMode = 'login';
      _refreshModal();
      document.getElementById('login-username').value = username;
      _showError('Cuenta creada. Ahora inicia sesión.', false);
      document.getElementById('login-error').style.color = '#4ade80';
      return false;
    }

    // Login OK
    if (!data.token) { _showError('Servidor no devolvió token'); return false; }
    saveSession(username, data.token);
    updateUserUI();
    hideLoginModal();
    _loadHistoryAndGreet();
    return true;

  } catch(e) {
    _showError('Sin conexión con el servidor', isReg);
    return false;
  }
}

async function doLogout() {
  try {
    await fetch('/logout', {method:'POST', headers:{'Content-Type':'application/json',...getAuthHeaders()}});
  } catch(_) {}
  clearSession();
  history = []; langCounts = {es:0, en:0};
  $msgs.innerHTML = '';
  $langBadge.textContent = '—'; $langBadge.className = 'lang-badge';
  localStorage.removeItem(STORAGE_KEY);
  updateUserUI();
  showLoginModal('login');
}

function _loadHistoryAndGreet() {
  history = loadHistory();
  for (const e of history) renderStored(e);
  for (const e of history) { if (e.lang) updateLangBadge(e.lang); }
  if (!history.length) {
    appendAIBubble({
      reply: `¡Bienvenido, ${currentSession.username}! Soy Green Tail.\n\nPuedes preguntarme en español o en inglés sobre Biología, Química, Física, Historia, Economía, Filosofía, Psicología y mucho más. ¿Qué quieres saber?`,
      confidence: 'alta', sources: [], connections: []
    });
  }
  scrollBottom();
  $input.focus();
}

// ── Eventos del modal ─────────────────────────────────────────
document.querySelectorAll('.auth-tab').forEach(t => {
  t.onclick = () => { authMode = t.dataset.tab; _refreshModal(); };
});
$authClose.onclick = hideLoginModal;
$authCancel.onclick = hideLoginModal;
$authOverlay.addEventListener('click', e => { if (e.target === $authOverlay) hideLoginModal(); });

$authSubmit.onclick = async () => {
  $authSubmit.disabled = true;
  if (authMode === 'login') {
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    if (!u || !p) _showError('Usuario y contraseña requeridos');
    else await doAuth(u, p, false);
  } else {
    const u  = document.getElementById('register-username').value.trim();
    const p  = document.getElementById('register-password').value;
    const p2 = document.getElementById('register-confirm').value;
    if (!u || !p) _showError('Usuario y contraseña requeridos', true);
    else if (p.length < 4) _showError('Mínimo 4 caracteres', true);
    else if (p !== p2) _showError('Las contraseñas no coinciden', true);
    else await doAuth(u, p, true);
  }
  $authSubmit.disabled = false;
};

// Enter en password → submit
['login-password','register-confirm'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => {
    if (e.key === 'Enter') $authSubmit.click();
  });
});

$userBtn.onclick = toggleUserMenu;

// Tema
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  $themeBtn.textContent = t === 'light' ? '☾' : '☀';
  localStorage.setItem(THEME_KEY, t);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
$themeBtn.onclick = () => applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');

// Colores de dominio
const DOMAIN_COLORS = {
  historia:'#e67e5a', quimica:'#5ac8d8', fisica:'#a78bfa', matematicas:'#34d399',
  geografia:'#60a5fa', geologia:'#fbbf24', botanica:'#4ade80', biologia:'#86efac',
  genetica:'#f472b6', microbiologia:'#fb923c', biologia_molecular:'#c084fc',
  psicologia:'#f87171', filosofia:'#818cf8', epistemologia:'#67e8f9',
  ontologia:'#a3e635', economia:'#fde68a', sociologia:'#fca5a5', general:'#94a3b8'
};
const dc = d => DOMAIN_COLORS[d] || '#8b90b0';

// Renderizado de markdown básico y seguro
function renderMarkdown(text) {
  let h = (text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  return h;
}

// Detección de idioma
const ES = new Set(['qué','cómo','cuándo','dónde','quién','cuál','cuánto','porqué',
  'que','como','cuando','donde','quien','cual','cuanto','porque','es','de','la','el',
  'los','las','un','una','en','y','o','su','con','por','para','más','muy','también',
  'sobre','explica','define','dime','habla','compara','relaciona','entre','qué','del']);
const EN = new Set(['what','how','when','where','who','which','why','is','the',
  'a','an','of','in','and','or','to','for','with','by','explain','define','tell',
  'describe','compare','does','do','can','are','about','more','also','between']);

function detectLang(text) {
  const toks = text.toLowerCase().split(/\W+/);
  let es = 0, en = 0;
  for (const t of toks) {
    if (ES.has(t)) es++;
    if (EN.has(t)) en++;
  }
  if (es === 0 && en === 0) return 'es';
  if (es > en * 1.5) return 'es';
  if (en > es * 1.5) return 'en';
  return 'mixed';
}

function updateLangBadge(lang) {
  if (lang === 'es') langCounts.es++;
  else if (lang === 'en') langCounts.en++;
  const total = langCounts.es + langCounts.en;
  let display = 'es';
  if (total > 2 && Math.abs(langCounts.es - langCounts.en) <= 1) display = 'mixed';
  else if (langCounts.en > langCounts.es) display = 'en';
  const labels = {es:'ES 🇪🇸', en:'EN 🇬🇧', mixed:'ES / EN'};
  $langBadge.textContent = labels[display];
  $langBadge.className = 'lang-badge ' + display;
}

// Historial
function saveHistory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(-80))); } catch(_) {}
}
function loadHistory() {
  if (!currentSession) return [];
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { return []; }
}

// Burbuja usuario
function appendUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = 'U';
  const bub = document.createElement('div');
  bub.className = 'bubble'; bub.textContent = text;
  div.append(av, bub);
  $msgs.appendChild(div);
  scrollBottom();
}

// Burbuja IA
function appendAIBubble(data) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = 'GT';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'min-width:0;max-width:100%';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  const txt = document.createElement('div');
  txt.innerHTML = renderMarkdown(data.reply || '');
  bub.appendChild(txt);

  // Modo clarificación
  if (data.mode === 'clarify' && data.options && data.options.length) {
    const opts = document.createElement('div');
    opts.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;';
    for (const o of data.options) {
      const b = document.createElement('button');
      b.className = 'qbtn';
      b.style.cssText = 'border-color:var(--accent);color:var(--accent);';
      b.textContent = o.label;
      b.onclick = () => sendMessage(o.query);
      opts.appendChild(b);
    }
    bub.appendChild(opts);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';

  if (data.confidence) {
    const b = document.createElement('span');
    b.className = `badge ${data.confidence}${data.mode==='debate'?' debate':''}`;
    b.textContent = data.confidence;
    if (data.score) b.title = `score: ${data.score}`;
    meta.appendChild(b);
  }
  if (data.lang) {
    const lb = document.createElement('span');
    lb.style.cssText = 'font-size:.65rem;color:var(--text2);';
    lb.textContent = data.lang.toUpperCase();
    meta.appendChild(lb);
  }
  if (data.connections && data.connections.length) {
    for (const d of data.connections.slice(0,6)) {
      const tag = document.createElement('span');
      tag.className = 'domain-tag';
      tag.textContent = d;
      tag.style.color = dc(d);
      meta.appendChild(tag);
    }
  }
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '⎘ copiar';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(data.reply || '').then(() => {
      copyBtn.textContent = '✓ copiado';
      setTimeout(() => { copyBtn.textContent = '⎘ copiar'; }, 1500);
    });
  };
  meta.appendChild(copyBtn);

  wrap.append(bub, meta);

  if (data.sources && data.sources.length) {
    const sw = document.createElement('div');
    sw.className = 'sources-wrap';
    const sb = document.createElement('button');
    sb.className = 'sources-btn';
    sb.textContent = `${data.sources.length} fuente(s)`;
    const sl = document.createElement('ul');
    sl.className = 'sources-list';
    for (const s of data.sources) {
      const li = document.createElement('li'); li.textContent = s; sl.appendChild(li);
    }
    sb.onclick = () => sl.classList.toggle('open');
    sw.append(sb, sl);
    wrap.appendChild(sw);
  }

  // Lista extra
  if (data.extra && data.extra.length) {
    const box = document.createElement('div');
    box.style.cssText = 'margin-top:10px;font-size:.83rem;line-height:1.7;';
    for (const item of data.extra) {
      const div = document.createElement('div');
      if (!item) {
        div.style.height = '6px';
      } else if (/^(DIAGNÓSTICO|ESTADO ACTUAL|CUELLOS DE BOTELLA|RECOMENDACIONES|USO —|CONOCIMIENTO —|AUTOAJUSTES)/.test(item)) {
        div.style.cssText = 'font-weight:700;color:var(--accent);margin-top:8px;';
        div.textContent = item;
      } else if (/^  ⚠|^  →|^  ·/.test(item)) {
        const sev = item.includes('⚠') ? '#f87171' : item.includes('→') ? '#fb923c' : '#94a3b8';
        div.style.cssText = `color:${sev};font-weight:600;margin-top:4px;`;
        div.textContent = item.trim();
      } else if (/^\s{4}/.test(item)) {
        div.style.cssText = 'color:var(--text2);padding-left:12px;margin-bottom:2px;';
        div.textContent = item.trim();
      } else if (/^  [0-9]+\./.test(item)) {
        div.style.cssText = 'font-weight:600;color:#4ade80;margin-top:6px;padding-left:8px;';
        div.textContent = item.trim();
      } else if (/^     Por qué:/.test(item)) {
        div.style.cssText = 'color:var(--text2);padding-left:20px;font-size:.8rem;';
        div.textContent = item.trim();
      } else if (/^  •/.test(item)) {
        div.style.cssText = 'color:var(--text2);padding-left:12px;';
        div.textContent = item.trim();
      } else {
        div.style.cssText = 'color:var(--text);padding-left:8px;';
        div.textContent = item.trim();
      }
      box.appendChild(div);
    }
    wrap.appendChild(box);
  }

  div.append(av, wrap);
  $msgs.appendChild(div);
  scrollBottom();
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'thinking';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = 'GT';
  const bub = document.createElement('div');
  bub.className = 'bubble thinking';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.append(av, bub);
  $msgs.appendChild(div);
  scrollBottom();
}
function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}
function scrollBottom() { $msgs.scrollTop = $msgs.scrollHeight; }

// Enviar
async function sendMessage(text) {
  text = text.trim();
  if (!text) return;
  if (!currentSession) {
    showLoginModal();
    return;
  }

  $input.value = '';
  $input.style.height = 'auto';
  $send.disabled = true;

  const lang = detectLang(text);
  updateLangBadge(lang);
  appendUserBubble(text);
  history.push({role:'user', text});
  showThinking();

  try {
    const headers = {'Content-Type': 'application/json', ...getAuthHeaders()};
    const res = await fetch('/ask', {
      method: 'POST',
      headers,
      body: JSON.stringify({text})
    });
    const data = await res.json();
    hideThinking();
    appendAIBubble(data);
    history.push({role:'ai', ...data});
    if (data.lang) updateLangBadge(data.lang);
    saveHistory();
  } catch(e) {
    hideThinking();
    appendAIBubble({
      reply: 'Error: no se pudo conectar con el servicio.\n\nAbre una terminal y ejecuta:\n  py server.py',
      confidence: 'baja', sources: [], connections: []
    });
  }
  $send.disabled = false;
  $input.focus();
}

$send.onclick = () => sendMessage($input.value);
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage($input.value); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});
document.querySelectorAll('.qbtn').forEach(b => { b.onclick = () => sendMessage(b.dataset.q); });
$clearBtn.onclick = () => {
  if (!confirm('¿Borrar toda la conversación?')) return;
  history = []; langCounts = {es:0,en:0};
  $msgs.innerHTML = '';
  $langBadge.textContent = '—'; $langBadge.className = 'lang-badge';
  localStorage.removeItem(STORAGE_KEY);
};

// Panel estadísticas
$statsBtn.onclick = () => { $panel.classList.toggle('open'); if ($panel.classList.contains('open')) loadStats(); };
$pClose.onclick   = () => $panel.classList.remove('open');

// ── Botón de análisis autónomo ──────────────────────────────────────────
$analystBtn.onclick = async () => {
  if (!currentSession) { appendAIBubble({reply:'Inicia sesión primero.', confidence:'baja', sources:[], connections:[]}); return; }
  $analystBtn.textContent = '⏳';
  $analystBtn.disabled = true;
  try {
    const headers = Object.assign({'Content-Type':'application/json'}, getAuthHeaders());
    const res = await fetch('/analysis/run', {method:'POST', headers, body:'{}'});
    const d   = await res.json();
    if (d.error) { appendAIBubble({reply:`Error: ${d.error}`, confidence:'baja', sources:[], connections:[]}); return; }
    const k  = d.knowledge || {};
    const c  = d.code      || {};
    const actions = (d.actions || []).slice(-5).map(a => `• ${a.action || a.fixes?.join(', ')}`).join('\n');
    const reply = [
      `**Informe de análisis autónomo** (ciclo #${d.runs})`,
      '',
      '**Conocimiento:**',
      `  Dominios activos: ${(k.domains||[]).length}`,
      `  Carpetas de usuario: ${(k.user_folders||[]).length}`,
      `  Archivos delgados (< 80 palabras): ${k.thin_files || 0}`,
      k.stubs_created?.length ? `  Carpetas nuevas creadas: ${k.stubs_created.length}` : '',
      '',
      '**Código:**',
      `  Archivos revisados: ${(c.files_scanned||[]).length}`,
      `  Archivos con problemas: ${c.files_with_issues || 0}`,
      `  Reparaciones aplicadas: ${(c.fixes_applied||[]).length}`,
      c.syntax_errors?.length ? `  ⚠ Errores de sintaxis: ${c.syntax_errors.map(e=>e.file).join(', ')}` : '',
      actions ? `\n**Últimas acciones:**\n${actions}` : '',
    ].filter(l => l !== null && l !== undefined).join('\n').trim();
    appendAIBubble({reply, confidence:'alta', sources:[], connections:['green_tail']});
  } catch(e) {
    appendAIBubble({reply:`Error conectando: ${e.message}`, confidence:'baja', sources:[], connections:[]});
  }
  $analystBtn.textContent = '🔬';
  $analystBtn.disabled = false;
};

async function loadStats() {
  try {
    const headers = getAuthHeaders();
    const [kR, sR] = await Promise.all([
      fetch('/knowledge', {headers}),
      fetch('/status', {headers})
    ]);
    const kb = await kR.json();
    const sys = await sR.json();
    document.getElementById('st-passages').textContent = (kb.passages||0).toLocaleString();
    document.getElementById('st-terms').textContent    = (kb.terms||0).toLocaleString();
    document.getElementById('st-domains').textContent  = Object.keys(kb.domains||{}).length;
    document.getElementById('st-tier').textContent     = kb.tier || '—';
    document.getElementById('st-cpu').textContent      = sys.cpu_cores || '—';
    document.getElementById('st-ram').textContent      = sys.ram_total_mb ? sys.ram_total_mb+' MB' : '—';
    document.getElementById('st-ramfree').textContent  = sys.ram_free_mb  ? sys.ram_free_mb+' MB'  : '—';
    const bars = document.getElementById('domain-bars');
    bars.innerHTML = '';
    const doms = kb.domains || {};
    const max = Math.max(...Object.values(doms), 1);
    for (const [name, count] of Object.entries(doms).sort((a,b)=>b[1]-a[1])) {
      const pct = Math.round(count/max*100);
      const color = dc(name);
      bars.innerHTML += `<div class="domain-bar">
        <div class="domain-bar-label"><span style="color:${color}">${name}</span><span>${count}</span></div>
        <div class="domain-bar-track"><div class="domain-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }
  } catch(_) {}
}

// Restaurar historial
function renderStored(entry) {
  if (entry.role === 'user') appendUserBubble(entry.text);
  else appendAIBubble(entry);
}

async function init() {
  const session = loadSession();

  if (!session) {
    updateUserUI();
    showLoginModal('login');
    appendAIBubble({
      reply: '¡Hola! Soy Green Tail.\n\nInicia sesión o regístrate para comenzar. Puedes preguntarme sobre Biología, Química, Física, Historia, Economía, Filosofía, Psicología y mucho más — en español o inglés.',
      confidence: 'alta', sources: [], connections: []
    });
  } else {
    // Valida que el token siga siendo válido en el servidor
    let tokenOk = false;
    try {
      const r = await fetch('/user/profile', {headers: getAuthHeaders()});
      tokenOk = r.ok;
    } catch(_) { tokenOk = false; }

    if (!tokenOk) {
      // Token inválido (servidor reiniciado u otro) → pedir login
      clearSession();
      updateUserUI();
      showLoginModal('login');
      appendAIBubble({
        reply: 'Tu sesión anterior expiró. Por favor vuelve a iniciar sesión.',
        confidence: 'alta', sources: [], connections: []
      });
    } else {
      updateUserUI();
      _loadHistoryAndGreet();
    }
  }

  try {
    const res = await fetch('/status');
    const s = await res.json();
    document.title = s.app_name || 'Green Tail';
    $sysInfo.textContent = `${s.tier} · ${s.cpu_cores} cores · ${s.ram_total_mb}MB`;
  } catch(_) { $sysInfo.textContent = 'sin servicio'; }

  scrollBottom();
}
init();

// ── Panel Enseñar ──────────────────────────────────────────────────────────
const $overlay     = document.getElementById('teach-overlay');
const $teachBtn    = document.getElementById('teach-btn');
const $teachClose  = document.getElementById('teach-close');
const $teachCancel = document.getElementById('teach-cancel');
const $clsBtn      = document.getElementById('teach-classify-btn');
const $saveBtn     = document.getElementById('teach-save-btn');
const $enrichSave  = document.getElementById('enrich-save-btn');
const $clsResult   = document.getElementById('classify-result');
const $saveResult  = document.getElementById('save-result');

let teachTab = 'nuevo';
let classifiedDomain = null;
let selectedDomain   = null;
let knownDomains     = [];

// Abrir / cerrar modal
$teachBtn.onclick  = () => {
  if (!currentSession) { showLoginModal(); return; }
  $overlay.classList.add('open'); loadTeachDomains(); resetTeach();
};
$teachClose.onclick  = () => $overlay.classList.remove('open');
$teachCancel.onclick = () => $overlay.classList.remove('open');
$overlay.addEventListener('click', e => { if (e.target === $overlay) $overlay.classList.remove('open'); });

// Tabs
document.querySelectorAll('.ttab').forEach(tab => {
  tab.onclick = () => {
    teachTab = tab.dataset.tab;
    document.querySelectorAll('.ttab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-nuevo').style.display       = teachTab === 'nuevo'       ? '' : 'none';
    document.getElementById('tab-enriquecer').style.display  = teachTab === 'enriquecer'  ? '' : 'none';
    $clsBtn.style.display   = teachTab === 'nuevo' ? '' : 'none';
    $saveBtn.style.display  = 'none';
    $enrichSave.style.display = teachTab === 'enriquecer' ? '' : 'none';
    resetTeach();
  };
});

function resetTeach() {
  $clsResult.classList.remove('show');
  $saveResult.className = 'save-result';
  $saveResult.style.display = 'none';
  $saveBtn.style.display = 'none';
  classifiedDomain = null; selectedDomain = null;
}

async function loadTeachDomains() {
  try {
    const headers = getAuthHeaders();
    const r = await fetch('/knowledge', {headers});
    const kb = await r.json();
    knownDomains = Object.keys(kb.domains || {});
  } catch(_) { knownDomains = []; }
}

// ── Paso 1: clasificar ────────────────────────────────────────
$clsBtn.onclick = async () => {
  const text = document.getElementById('teach-text').value.trim();
  if (!text) { alert('Escribe o pega contenido primero.'); return; }

  $clsBtn.disabled = true; $clsBtn.textContent = 'Analizando…';
  try {
    const headers = {'Content-Type': 'application/json', ...getAuthHeaders()};
    const r = await fetch('/classify', {
      method: 'POST',
      headers,
      body: JSON.stringify({text})
    });
    const cls = await r.json();
    classifiedDomain = cls.domain;
    selectedDomain   = cls.domain;

    const $main = document.getElementById('clf-main');
    if (cls.is_new || !cls.domain) {
      $main.innerHTML = `<span class="clf-new">⊕ Tema nuevo</span> — no encaja en ningún dominio existente`;
    } else {
      $main.innerHTML = `Dominio detectado: <span class="clf-domain">${cls.domain}</span> `
        + `<span style="color:var(--text2);font-size:.75rem;">(confianza ${Math.round(cls.confidence*100)}%)</span>`;
    }
    document.getElementById('clf-reason').textContent = cls.reasoning || '';
    const alts = cls.alternatives || [];
    document.getElementById('clf-alts').textContent = alts.length
      ? 'Alternativas: ' + alts.map(([d,s]) => `${d} (${Math.round(s*100)}%)`).join(', ')
      : '';

    const chips = document.getElementById('domain-chips');
    chips.innerHTML = '';
    const allDomains = cls.is_new
      ? knownDomains
      : [cls.domain, ...knownDomains.filter(d => d !== cls.domain)];
    if (cls.is_new) {
      const nc = document.createElement('button');
      nc.className = 'dchip selected';
      nc.textContent = '⊕ Crear dominio nuevo';
      nc.dataset.domain = '__new__';
      nc.onclick = () => selectChip(nc, null);
      chips.appendChild(nc);
    }
    for (const d of allDomains.slice(0, 12)) {
      const c = document.createElement('button');
      c.className = 'dchip' + (d === cls.domain ? ' selected' : '');
      c.textContent = d;
      c.dataset.domain = d;
      c.onclick = () => selectChip(c, d);
      chips.appendChild(c);
    }

    $clsResult.classList.add('show');
    $saveBtn.style.display = '';
  } catch(e) {
    alert('Error al clasificar: ' + e.message);
  }
  $clsBtn.disabled = false; $clsBtn.textContent = 'Analizar dominio';
};

function selectChip(el, domain) {
  document.querySelectorAll('.dchip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedDomain = domain;
  document.getElementById('teach-domain-override').value = '';
}

// ── Paso 2: guardar nuevo conocimiento ────────────────────────
$saveBtn.onclick = async () => {
  const text   = document.getElementById('teach-text').value.trim();
  const title  = document.getElementById('teach-title').value.trim();
  const override = document.getElementById('teach-domain-override').value.trim();
  if (!text) { alert('El contenido está vacío.'); return; }

  let domain    = override || (selectedDomain !== '__new__' ? selectedDomain : null) || null;
  let forceNew  = (!domain) || (selectedDomain === '__new__' && !override);

  $saveBtn.disabled = true; $saveBtn.textContent = 'Guardando…';
  try {
    const headers = {'Content-Type': 'application/json', ...getAuthHeaders()};
    const r = await fetch('/learn', {
      method: 'POST',
      headers,
      body: JSON.stringify({text, title: title || undefined,
                            domain: domain || undefined,
                            force_new_domain: forceNew})
    });
    const res = await r.json();
    $saveResult.className = res.saved ? 'ok' : 'err';
    $saveResult.style.display = 'block';
    $saveResult.textContent = res.message || (res.saved ? '¡Guardado!' : 'Error al guardar.');
    if (res.saved) {
      knownDomains = [...new Set([...knownDomains, res.domain])];
      if (res.is_new_domain) addDomainButton(res.domain);
      $saveBtn.style.display = 'none';
      appendAIBubble({
        reply: `✓ Aprendido: "${title || text.slice(0,60)}…"\n\nGuardado en: ${res.file}\nDominio: ${res.domain}${res.is_new_domain ? ' (nuevo)' : ''}\nÍndice actualizado: ${res.classification?.reasoning || ''}`,
        confidence: 'alta', sources: [], connections: [res.domain]
      });
    }
  } catch(e) {
    $saveResult.className = 'err';
    $saveResult.style.display = 'block';
    $saveResult.textContent = 'Error de conexión: ' + e.message;
  }
  $saveBtn.disabled = false; $saveBtn.textContent = 'Guardar';
};

// ── Enriquecer archivo existente ──────────────────────────────
let enrichDebounce = null;
document.getElementById('enrich-query').addEventListener('input', function() {
  clearTimeout(enrichDebounce);
  const q = this.value.trim();
  if (!q) { document.getElementById('enrich-file-result').textContent = ''; return; }
  enrichDebounce = setTimeout(async () => {
    try {
      const headers = {'Content-Type': 'application/json', ...getAuthHeaders()};
      const r = await fetch('/ask', {
        method: 'POST',
        headers,
        body: JSON.stringify({text: q})
      });
      const d = await r.json();
      const src = d.sources && d.sources[0] ? d.sources[0].split(' ')[0] : null;
      document.getElementById('enrich-file-result').textContent =
        src ? `Archivo encontrado: ${src}` : 'No se encontró un archivo existente relacionado.';
    } catch(_) {}
  }, 500);
});

$enrichSave.onclick = async () => {
  const query   = document.getElementById('enrich-query').value.trim();
  const text    = document.getElementById('enrich-text').value.trim();
  const section = document.getElementById('enrich-section').value.trim();
  if (!query || !text) { alert('Escribe la búsqueda y el contenido.'); return; }

  $enrichSave.disabled = true; $enrichSave.textContent = 'Guardando…';
  try {
    const headers = {'Content-Type': 'application/json', ...getAuthHeaders()};
    const r = await fetch('/enrich', {
      method: 'POST',
      headers,
      body: JSON.stringify({query, text, section_title: section || undefined})
    });
    const res = await r.json();
    const $er = document.getElementById('enrich-result');
    $er.className = res.saved ? 'ok' : 'err';
    $er.style.cssText = `display:block;margin-top:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;${res.saved ? 'background:#16a34a22;border:1px solid #4ade8044;color:#4ade80' : 'background:#dc262622;border:1px solid #f8717144;color:#f87171'}`;
    $er.textContent = res.message;
    if (res.saved) {
      appendAIBubble({
        reply: `✓ Archivo enriquecido: ${res.file}\n${res.message}`,
        confidence: 'alta', sources: [res.file], connections: []
      });
    }
  } catch(e) {
    const $er = document.getElementById('enrich-result');
    $er.style.cssText = 'display:block;margin-top:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;background:#dc262622;border:1px solid #f8717144;color:#f87171';
    $er.textContent = 'Error: ' + e.message;
  }
  $enrichSave.disabled = false; $enrichSave.textContent = 'Añadir sección';
};

function addDomainButton(domain) {
  const label = domain.charAt(0).toUpperCase() + domain.slice(1).replace(/-/g,' ');
  const btn = document.createElement('button');
  btn.className = 'qbtn';
  btn.dataset.q = `¿Qué es ${label}?`;
  btn.textContent = label;
  btn.onclick = () => sendMessage(btn.dataset.q);
  document.querySelector('.quick-btns').appendChild(btn);
}
</script>
</body>
